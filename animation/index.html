<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }
    body{
        width: 100%;
        height: 100vh;
        background-image: linear-gradient( to left, rgb(149, 102, 172), rgb(17, 0, 255)  ) ;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .loader{
        width: 30px;
        height: 30px;
        border: 4px solid rgb(33, 208, 17);
        border-radius: 25%;
        animation: load 2s infinite ease-in;
        box-shadow: rgba(107, 107, 128, 0.25) 0px 30px 60px -12px inset, rgba(209, 22, 22, 0.3) 0px 18px 36px -18px inset;
    }
    @keyframes load{
        0%{
            transform: rotateX(0) rotateY(0) rotateZ(0);
        }
        33%{
            transform: rotateX(180deg) rotateY(0) rotateZ(0);
        }
        66%{
            transform: rotateX(180deg) rotateY(180deg) rotateZ(0);
        }
        100%{
            transform: rotateX(180deg) rotateY(180deg) rotateZ(180deg);
        }
    }
</style>
<body>
    <div class="loader"></div>
</body>
</html>
