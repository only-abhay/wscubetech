<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card{
            width: 150px;
            height: 250px;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
        }
        .card img{
            width: 100%;
            height: 80%;
        }
        .card h4{
            color: black;
            font-weight: bold;
            border-top: 1px solid black;


        }
        .card p{
            color:black;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
    </div>
    <script>
        var con=document.querySelector(".container")
      async  function abhay(){
            var data= await fetch("https://dummyjson.com/carts")
            var bb=await data.json()
            var crt=  bb.carts
            for( let cr of crt){
                var prodc=cr.products;
               for(let pro of prodc){
             var thumb= pro.thumbnail
               var div=document.createElement("div")
                 div.classList.add("card")
                  div.innerHTML=`
              <img src="${thumb}"alt="">
              <h4>${pro.price}</h4>
               <p>${pro.title}</p>  
                 `
                con.append(div) 
               }  
            }
                }
            
            abhay()
        
    </script>
</body>
</html>
