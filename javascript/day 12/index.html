<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <button>strt</button>
 <button>stop</button>
 <script>
    var btn=document.querySelectorAll("button");
    var abhay=null;
btn[0].addEventListener(
    "click",
    function(){
      abhay= setInterval(
            function(){
                console.log("hello")
            },
            1000,
)
    }
)
btn[1].addEventListener(
    "click",
    function(){
        clearInterval(abhay)
    }
)

 </script>
</body>
</html>
