<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
            background-color: aqua;
            color: blue;
            box-shadow: 18px 13px 26px 10px wheat;
        }
    </style>
</head>
<body>
    <div class="box">
        Abhay
    </div>
    <button onclick="demo(1)">click me</button>
    <button onclick="demo(2)">Remove</button>
    <script>
        var box= document.querySelector(".box")
        function demo(a){
          if(a==1){
              box.style.backgroundColor="black"
            box.style.color="white"
            box.innerText="nandu"
          }else{
            box.style=""
            box.innerText="abhay"
          }
        }
    </script>
</body>
</html>
