<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="conatiner">
    <div class="left-con">
      <h1 class="heading">Invitation Letter</h1>
      <div class="name">
        <span>Name:</span>
        <input type="text" id="nme" value="" placeholder="Name">
      </div>
      <div class="num">
        <span>Phone Num:</span>
        <input type="tel" id="number" placeholder="Number">
      </div>
      <div class="Gmail">
        <span>Gmail:</span>
        <input type="email" name="" id="gmal" placeholder="Gmail Number">
      </div>
       <div class="fontsize">
      <button id="fontplus">+</button>
      <button  id="fontminus">-</button>
    </div>
    </div>
    <div class="right-con">
    <div class="name-right"></div>
    <div class="num-right"></div>
    <div class="Gmail-right"></div>
    </div>
</div>




    <script src="script.js"></script>
</body>
</html>
