<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple To-Do List</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .todo-container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 340px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
           justify-content: center;
        align-items: center;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    ul {
        list-style: none;
        padding: 0;
    }
    .listyle{
     padding: 10px;
     border: 1px solid black;
     width: 300px;
     border-radius: 8px;
     position: relative;
    }
    #inp{
        padding: 10px;
        width: 245px;
        border-radius: 8px;
    }
    .input-box button{
        padding: 10px;
        background-color: blue;
        color: white;
        border-radius: 8px;

    }
    .deli{
      position: absolute;
      right: 5px;
      top: 10px;  
      background-color: red;
      color: white;
      height: 18px;
      width: 50px;
      border-radius: 4px;
      cursor: pointer;
    }
</style>

</head>
<body >

<div class="todo-container">
    <h2>My To-Do List</h2>
    <div class="input-box">
        <input id="inp" type="text"  placeholder="give me task">
        <button  onclick="addbut()" id="addi">add</button>
    </div>
    <ul id="ullist">
    </ul>

    <div class="add-task">
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
